# ======================================================================
# Badminton Tournament Manager - Nginx Server Block Configuration
# ======================================================================
# This configuration belongs inside your Nginx server block, typically
# located in /etc/nginx/sites-available/your-domain.conf or within the
# Nginx management area of your Hostinger VPS control panel.
# ======================================================================

server {
    listen 80;
    listen [::]:80;
    
    # Replace with your actual domain or IP address
    server_name your-domain.com www.your-domain.com;
    
    # Path to the compiled React static files (e.g., your "dist" build output)
    root /var/www/badminton-manager/dist;
    index index.html;

    # 1. ROUTE ALL API REQUESTS TO NODE.JS EXPRESS BACKEND
    # This ensures that any /api/* request is directly proxied to your local
    # running Node.js server (e.g., PM2 running server.js on port 3000).
    # This prevents serving the index.html fallback for /api paths and
    # completely avoids the "Unexpected token <" JSON parsing error.
    location /api/ {
        # Point to the local port your Node app is listening on
        proxy_pass http://127.0.0.1:3000;
        
        # Standard proxy headers to preserve real IP and Host info
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Real client IP forwarding
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for long-running endpoints if necessary
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 2. STATIC ASSETS AND FRONTEND ROUTING
    # Try serving matching static files directly. If no file matches, fall back
    # to index.html to allow React Router / client-side SPA routing to function.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 3. OPTIONAL: High Performance Static File Cache Rules
    # Caching rules for JS, CSS, and media assets to decrease load times.
    location ~* \.(?:css|js|woff2?|svg|gif|png|jpe?g|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # 4. SECURITY HEADERS
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}
